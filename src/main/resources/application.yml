server:
  port: 8085

spring:
  datasource:
    url: jdbc:postgresql://postgres-order:5432/oms_order_db
    username: postgres
    password: admin

  application:
    name: oms-payment-worker

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Kolkata

cloud:
  aws:
    region:
      static: us-east-1
    credentials:
      access-key-id: test
      secret-access-key: test
    sqs:
      endpoint: http://localstack:4566
      listener:
        auto-create: true

sqs:
  order-created-queue: order-created-queue
  payment-failed-queue: payment-failed-queue